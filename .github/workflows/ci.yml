name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test --workspace apps/web -- --ci --passWithNoTests
        env:
          AUTH_SECRET: ci-test-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/hour-tracker-web:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/hour-tracker-web:latest \
            .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/hour-tracker-web:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/hour-tracker-web:latest

      - name: Deploy to VM
        run: |
          gcloud compute ssh hour-tracker-app \
            --zone=us-central1-a \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --command="
              gcloud auth configure-docker --quiet &&
              docker pull gcr.io/${{ secrets.GCP_PROJECT_ID }}/hour-tracker-web:latest &&
              cd /opt/hour-tracker &&
              docker compose up -d --no-deps web
            "
